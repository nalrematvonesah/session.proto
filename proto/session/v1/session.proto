syntax = "proto3";

package session.v1;

option go_package = "github.com/nalrematvonesah/session.proto/gen/session/v1;sessionv1";

service SessionService {
  rpc StartSession(StartRequest) returns (SessionResponse);
  rpc EndSession(EndRequest) returns (SessionResponse);
  rpc GetSession(SessionRequest) returns (SessionResponse);
  rpc CalculatePrice(SessionRequest) returns (PriceResponse);
  rpc GetActiveSessions(UserRequest) returns (SessionList);
  rpc GetUserSessions(UserRequest) returns (SessionList);   
}

message StartRequest {
  int64 user_id = 1;
  int64 vehicle_id = 2;
  string request_id = 3;
}

message EndRequest {
  int64 session_id = 1;
}

message SessionRequest {
  int64 session_id = 1;
}

message SessionResponse {
  int64 session_id = 1;
  int64 slot_id = 2;
  int64 vehicle_id = 3;
  int64 start_time_unix = 4;
  int64 end_time_unix = 5;
  double amount = 6;
}

message PriceResponse {
  double amount = 1;
  int64 elapsed_seconds = 2;
}

message UserRequest {
  int64 user_id = 1;
}

message SessionList {
  repeated SessionResponse sessions = 1;
}