name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Protocol Buffers definitions for the Session service.

            ## Install in a Go service

            ```bash
            go get github.com/nalrematvonesah/session.proto@${{ github.ref_name }}
            ```

            ```go
            import sessionv1 "github.com/nalrematvonesah/session.proto/gen/session/v1"
            ```
